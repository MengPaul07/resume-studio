name: D-Resume Benchmark

on:
  pull_request:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
      - 'requirements.txt'
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'scripts/**'
  schedule:
    # Daily at 03:57 UTC — run full suite including LLM judge
    - cron: '57 3 * * *'
  workflow_dispatch:
    inputs:
      layer:
        description: 'Which layer to run'
        required: false
        default: 'all'
        type: choice
        options: ['unit', 'agent', 'quality', 'all']
      regression:
        description: 'Regression mode only'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ── Layer 1: Unit Tests (always, fast) ──────────────────────────────
  unit-tests:
    name: Unit Tests (Layer 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml \
            -m "not integration and not slow" \
            --junitxml=junit-unit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: |
            junit-unit.xml
            coverage.xml

  # ── Layer 2: Agent Eval Regression (on PR) ─────────────────────────
  agent-eval-regression:
    name: Agent Eval Regression (Layer 2)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    services:
      # Note: requires a running resume-builder server
      # Uncomment and configure if you have a Docker image
      # app:
      #   image: resume-builder:latest
      #   ports:
      #     - 8000:8000
      #   env:
      #     LLM_MODEL: ${{ secrets.LLM_MODEL }}
      #     DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run agent eval (regression)
        run: |
          python scripts/agent_eval.py --regression --output-format json -j 4 || true
        env:
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Generate eval summary
        if: always()
        run: |
          python scripts/eval_aggregator.py outputs/agent_eval/ --format markdown

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-eval-results
          path: |
            outputs/agent_eval/
            outputs/eval_summary.md
            outputs/eval_summary.json

  # ── Full Suite (daily or manual) ────────────────────────────────────
  full-suite:
    name: Full Benchmark Suite
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.regression != 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run full benchmark suite
        run: |
          python scripts/dres_bench.py run --output-format markdown || true
        env:
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'deepseek-chat' }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Generate HTML dashboard
        if: always()
        run: |
          python scripts/dres_bench.py report outputs/agent_eval/

      - name: Upload full results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-bench-results
          path: |
            outputs/agent_eval/
            outputs/eval_summary.md
            outputs/eval_summary.json
            outputs/bench_report.html

      - name: Check for regressions
        if: always()
        run: |
          python -c "
          import json, sys
          from pathlib import Path
          p = Path('outputs/eval_summary.json')
          if p.exists():
              data = json.loads(p.read_text())
              regressions = data.get('regressions', [])
              if regressions:
                  print(f'REGRESSION DETECTED: {len(regressions)} issues')
                  for r in regressions:
                      print(f'  - {r}')
                  sys.exit(1)
              print('No regressions detected.')
          "
          # Don't fail the workflow on regression check — just report
        continue-on-error: true
