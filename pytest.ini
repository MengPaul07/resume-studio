[pytest]
# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (require running server)
    unit: marks tests as unit tests (fast, no external deps)
    llm: marks tests that call LLM APIs
    intent: tests for IntentResolver classification
    self_check: tests for TargetedSelfChecker
    suggestions: tests for suggestion ops
    turn_runner: tests for turn orchestration
    regression: regression-critical tests

# Async (requires pytest-asyncio)
# asyncio_mode = auto

# Output
addopts = -v --tb=short --strict-markers
console_output_style = progress

# Coverage (when using pytest-cov)
# addopts = -v --tb=short --strict-markers --cov=src --cov-report=term-missing --cov-report=html

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
